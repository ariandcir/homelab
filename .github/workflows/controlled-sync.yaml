name: controlled-sync

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Choose operation target"
        required: true
        default: flux
        type: choice
        options:
          - flux
          - opentofu-plan
          - opentofu-apply
      environment:
        description: "Environment name"
        required: true
        default: lab

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        if: startsWith(inputs.target, 'opentofu')
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.8

      - name: Setup Flux CLI
        if: inputs.target == 'flux'
        uses: fluxcd/flux2/action@main

      - name: Flux reconcile (controlled)
        if: inputs.target == 'flux'
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > "$RUNNER_TEMP/kubeconfig"
          export KUBECONFIG="$RUNNER_TEMP/kubeconfig"
          # TODO: ensure source/kustomization names match your bootstrap config.
          flux reconcile source git flux-system --namespace flux-system --with-source
          flux reconcile kustomization flux-system --namespace flux-system --with-source

      - name: OpenTofu init/plan
        if: inputs.target == 'opentofu-plan' || inputs.target == 'opentofu-apply'
        working-directory: infra/opentofu/environments/lab
        run: |
          tofu init -input=false
          tofu plan -input=false -out=tfplan

      - name: OpenTofu apply (controlled)
        if: inputs.target == 'opentofu-apply'
        working-directory: infra/opentofu/environments/lab
        run: tofu apply -input=false -auto-approve tfplan
