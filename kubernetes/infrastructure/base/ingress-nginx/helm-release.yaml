apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 30m
  releaseName: ingress-nginx
  targetNamespace: ingress-nginx
  install:
    createNamespace: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: ingress-nginx
      version: ">=4.11.0 <5.0.0"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      interval: 12h
  values:
    controller:
      service:
        type: LoadBalancer
